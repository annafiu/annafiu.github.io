<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404: page not found — farrij annafi'u</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/main.css">
<style>
.error-container { 
  max-width: 680px; 
  margin: 0 auto; 
  padding: 120px 40px; 
  text-align: center; 
}
.error-code { 
  font-size: clamp(48px, 8vw, 80px); 
  font-weight: 300; 
  letter-spacing: -0.05em; 
  line-height: 1; 
  margin-bottom: 24px; 
  color: var(--light, #888);
}
.error-title { 
  font-size: clamp(20px, 3vw, 26px); 
  font-weight: 300; 
  letter-spacing: -0.03em; 
  line-height: 1.3; 
  margin-bottom: 16px; 
}
.error-message { 
  font-size: 15px; 
  line-height: 1.6; 
  margin-bottom: 48px; 
  color: var(--light, #666);
}
.btn-home {
  display: inline-block;
  padding: 12px 24px;
  border: 1px solid currentColor;
  text-decoration: none;
  font-size: 14px;
  transition: opacity 0.2s ease;
}
.btn-home:hover {
  opacity: 0.7;
}
@media (max-width: 600px) {
  .error-container { padding: 80px 20px; }
}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">farrij annafi'u</a>
  <div class="nav-links">
    <a href="/works" data-nav="works">works</a>
    <a href="/resume" data-nav="resume">resume</a>
    <a href="/journal" data-nav="journal">journal</a>
    <a href="/about" data-nav="about">about</a>
    <a href="/contact" data-nav="contact">contact</a>
  </div>
  <button class="nav-burger" id="navBurger" aria-label="menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="/works">works</a>
  <a href="/resume">resume</a>
  <a href="/journal">journal</a>
  <a href="/about">about</a>
  <a href="/contact">contact</a>
</div>

<main>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">the page you are looking for does not exist.</h1>
    <p class="error-message">the link might be broken, or the structural path has been updated or relocated.</p>
    <a class="btn-home" href="/">← back to homepage</a>
  </div>
</main>

<script src="/assets/js/nav.js"></script>
</body>
</html>
