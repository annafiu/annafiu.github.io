<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>farrij annafi'u — architectural designer</title>
<meta name="description" content="Architectural designer based in Yogyakarta — crafting thoughtful spaces from initial concept to comprehensive construction documentation.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/main.css">
<style>
  /* HOME-SPECIFIC STYLES */
  body { display: flex; flex-direction: column; min-height: 100vh; }
  .home-wrap {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px 40px 60px; text-align: center;
  }
  .home-content-group {
    display: flex; flex-direction: row; align-items: center;
    justify-content: center; gap: 48px; margin-bottom: 56px;
  }
  .home-photo {
    width: 180px; height: 180px; flex-shrink: 0;
    background: var(--white); border: 1px solid var(--border);
    overflow: hidden;
  }
  .home-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .home-text { display: flex; flex-direction: column; align-items: flex-start; max-width: 380px; }
  .home-name {
    font-size: clamp(34px, 5vw, 44px); font-weight: 300;
    letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 14px;
  }
  .home-desc { font-size: 15px; font-weight: 300; color: var(--muted); line-height: 1.7;text-align: left; }
  .home-links { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; }
  .home-links a {
    font-size: 13px; font-weight: 300; color: var(--text);
    text-decoration: underline; text-underline-offset: 3px;
    text-decoration-color: var(--border); transition: text-decoration-color var(--t);
  }
  .home-links a:hover { text-decoration-color: var(--text); }
  @media (max-width: 640px) {
    .home-content-group { flex-direction: column; gap: 24px; }
    .home-text { align-items: center; text-align: center; }
    .home-wrap { padding: 80px 24px 40px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">farrij annafi'u</a>
  <div class="nav-links">
    <a href="/works" data-nav="works">works</a>
    <a href="/resume" data-nav="resume">resume</a>
    <a href="/journal" data-nav="journal">journal</a>
    <a href="/about" data-nav="about">about</a>
    <a href="/contact" data-nav="contact">contact</a>
  </div>
  <button class="nav-burger" id="navBurger" aria-label="menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="/works">works</a>
  <a href="/resume">resume</a>
  <a href="/journal">journal</a>
  <a href="/about">about</a>
  <a href="/contact">contact</a>
</div>

<main class="home-wrap">
  <div class="home-content-group">
    <div class="home-photo">
      <img src="/assets/img/profile.jpg" alt="Farrij Annafi'u" onerror="this.style.display='none'">
    </div>
    <div class="home-text">
      <div class="home-name">farrij annafi'u</div>
      <p class="home-desc">Architectural designer based in Semarang — crafting thoughtful spaces from initial concept to comprehensive construction documentation.</p>
    </div>
  </div>
  <div class="home-links">
    <a href="/works">view works</a>
    <a href="/contact">get in touch</a>
  </div>
</main>

<script src="/assets/js/nav.js"></script>
</body>
</html>
