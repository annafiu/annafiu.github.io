<head>

</head>
<body>

<nav>
  <a class="nav-logo" href="/">farrij annafi'u</a>
  <div class="nav-links">

<div class="mobile-menu" id="mobileMenu">
  <a href="/works">works</a>
  <a href="/resume">resume</a>
  <a href="/journal">journal</a>

  <a href="/contact">contact</a>
</div>

<main>
  <div class="content-wrap" style="max-width:800px; padding-top:56px;">
    <span class="page-label" style="margin-bottom:40px; display:block; text-align:center;">writings</span>

    <!-- Category filter -->
    <div style="display:flex; gap:4px; flex-wrap:wrap; justify-content:center; margin-bottom:40px;">
      <button class="filter-tag active" data-filter="all" style="border-radius:100px; border:1px solid transparent;">all</button>
      <button class="filter-tag" data-filter="reflection" style="border-radius:100px; border:1px solid transparent;">reflection</button>
      <button class="filter-tag" data-filter="technical" style="border-radius:100px; border:1px solid transparent;">technical</button>
      <button class="filter-tag" data-filter="workflow" style="border-radius:100px; border:1px solid transparent;">workflow</button>
      <button class="filter-tag" data-filter="architecture" style="border-radius:100px; border:1px solid transparent;">architecture</button>
      <button class="filter-tag" data-filter="material" style="border-radius:100px; border:1px solid transparent;">material</button>
      <button class="filter-tag" data-filter="design" style="border-radius:100px; border:1px solid transparent;">design</button>
    </div>

    <div class="journal-list" id="journalList"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<script src="/assets/js/nav.js"></script>
<script>
var posts = [
  { slug: "2025/06/learning-to-read-space",    title: "learning to read space: notes from the field",                 date: "june 2025",     cat: "reflection" },
  { slug: "2025/04/cost-estimation",           title: "cost estimation and the art of anticipating the uncertain",     date: "april 2025",    cat: "technical" },
  { slug: "2025/02/small-office-workflow",     title: "the small office workflow: sketchup, autocad, and beyond",      date: "february 2025", cat: "workflow" },
  { slug: "2024/12/tropical-architecture",     title: "tropical architecture: what the books don't teach you",         date: "december 2024", cat: "architecture" },
  { slug: "2024/10/bamboo-modern-architecture",title: "bamboo in modern architecture: a tectonic exploration",         date: "october 2024",  cat: "material" },
  { slug: "2024/08/narrow-lot-problem",        title: "the narrow lot problem: maximizing light on a 6-meter site",    date: "august 2024",   cat: "design" },
  { slug: "2024/06/sketchup-layer-management", title: "structuring clean layer management inside sketchup pipelines",  date: "june 2024",     cat: "workflow" },
  { slug: "2024/04/architectural-entrance",    title: "redefining the architectural entrance layout template",          date: "april 2024",    cat: "reflection" },
  { slug: "2024/02/solar-tracking-masterplans",title: "solar tracking variables within high-humidity masterplans",     date: "february 2024", cat: "technical" },
  { slug: "2023/12/retrospective-vernacular",  title: "retrospective analysis of traditional vernacular elements",      date: "december 2023", cat: "architecture" },
];

var PER_PAGE = 5;
var currentPage = 1;
var activeFilter = 'all';

function filtered() {
  if (activeFilter === 'all') return posts;
  return posts.filter(function(p) { return p.cat === activeFilter; });
}

function render() {
  var list = filtered();
  var totalPages = Math.ceil(list.length / PER_PAGE);
  var start = (currentPage - 1) * PER_PAGE;
  var visible = list.slice(start, start + PER_PAGE);

  var jl = document.getElementById('journalList');
  jl.innerHTML = '';
  visible.forEach(function(p) {
    var a = document.createElement('a');
    a.className = 'journal-row';
    a.href = '/journal/' + p.slug;
    a.innerHTML =
      '<span class="jrow-date">' + p.date + '</span>' +
      '<span class="jrow-title">' + p.title + '</span>' +
      '<span class="jrow-cat">' + p.cat + '</span>';
    jl.appendChild(a);
  });

  var pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  var html = '<button class="page-nav-arrow" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>prev</button>';
  for (var i = 1; i <= totalPages; i++) {
    html += '<button class="page-num' + (i===currentPage?' active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  html += '<button class="page-nav-arrow" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===totalPages?'disabled':'') + '>next</button>';
  pg.innerHTML = html;
}

function goPage(n) {
  var list = filtered();
  var total = Math.ceil(list.length / PER_PAGE);
  if (n < 1 || n > total) return;
  currentPage = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.querySelectorAll('.filter-tag').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-tag').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.getAttribute('data-filter');
    currentPage = 1;
    render();
  });
});

render();
</script>
</body>
</html>
